<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090d16" />
      <stop offset="100%" stop-color="#020408" />
    </linearGradient>
    <!-- Node/Wire Gradients -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>
    <!-- Glow Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Base Squircle -->
  <rect x="32" y="32" width="448" height="448" rx="100" fill="url(#bgGrad)" stroke="#1e293b" stroke-width="6" />

  <!-- Grid Pattern (Subtle Tech Highlight) -->
  <g opacity="0.15" stroke="#475569" stroke-width="1.5">
    <line x1="128" y1="32" x2="128" y2="480" />
    <line x1="256" y1="32" x2="256" y2="480" />
    <line x1="384" y1="32" x2="384" y2="480" />
    <line x1="32" y1="128" x2="480" y2="128" />
    <line x1="32" y1="256" x2="480" y2="256" />
    <line x1="32" y1="384" x2="480" y2="384" />
  </g>

  <!-- Glowing Outer Connection Lines (Binary Tree Representation) -->
  <g stroke="url(#accentGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.95">
    <!-- Links from root -->
    <line x1="256" y1="150" x2="170" y2="256" />
    <line x1="256" y1="150" x2="342" y2="256" />
    <!-- Links to leaves -->
    <line x1="170" y1="256" x2="110" y2="362" />
    <line x1="170" y1="256" x2="210" y2="362" />
    <line x1="342" y1="256" x2="302" y2="362" />
    <line x1="342" y1="256" x2="402" y2="362" />
  </g>

  <!-- Interconnected Nodes (Data Structure Nodes) -->
  <!-- Leaf 1 -->
  <circle cx="110" cy="362" r="16" fill="#0f172a" stroke="#ef4444" stroke-width="5" filter="url(#glow)" />
  <!-- Leaf 2 -->
  <circle cx="210" cy="362" r="16" fill="#0f172a" stroke="#10b981" stroke-width="5" filter="url(#glow)" />
  <!-- Leaf 3 -->
  <circle cx="302" cy="362" r="16" fill="#0f172a" stroke="#10b981" stroke-width="5" filter="url(#glow)" />
  <!-- Leaf 4 -->
  <circle cx="402" cy="362" r="16" fill="#0f172a" stroke="#3b82f6" stroke-width="5" filter="url(#glow)" />

  <!-- Middle Child Left -->
  <circle cx="170" cy="256" r="22" fill="#0f172a" stroke="url(#glowGrad)" stroke-width="6" />
  <path d="M 164 256 L 176 256" stroke="#818cf8" stroke-width="3" stroke-linecap="round" />
  <!-- Middle Child Right -->
  <circle cx="342" cy="256" r="22" fill="#0f172a" stroke="url(#glowGrad)" stroke-width="6" />
  <path d="M 336 256 L 348 256 M 342 250 L 342 262" stroke="#c084fc" stroke-width="3" stroke-linecap="round" />

  <!-- Root Node - Styled as Code / Core Brain Node -->
  <circle cx="256" cy="150" r="28" fill="#1e1b4b" stroke="url(#accentGrad)" stroke-width="6" filter="url(#glow)" />
  
  <!-- Sleek Code Brackets overlapping with Tree -->
  <g stroke="url(#glowGrad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Left Bracket -->
    <path d="M 180 180 L 120 256 L 180 332" />
    <!-- Right Bracket -->
    <path d="M 332 180 L 392 256 L 332 332" />
  </g>

  <!-- Center Symbol inside Root -->
  <polygon points="256,134 269,158 243,158" fill="#a855f7" />
  <circle cx="256" cy="153" r="4" fill="#38bdf8" />
</svg>
